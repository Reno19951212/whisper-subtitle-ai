<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 字幕轉換 APP</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e2e2f0;
      --text-dim: #888899;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --subtitle-bg: rgba(0,0,0,0.78);
      --subtitle-text: #ffffff;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
      margin-left: auto;
    }
    .status-dot.connected { background: var(--success); }

    .status-text {
      font-size: 13px;
      color: var(--text-dim);
    }

    .btn-restart {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      line-height: 1;
    }
    .btn-restart:hover { border-color: var(--accent); color: var(--accent2); }
    .btn-restart.spinning { animation: spin 0.8s linear infinite; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Main Layout ===== */
    main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 20px;
      padding: 20px 24px;
      flex: 1;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    @media (max-width: 1024px) {
      main { grid-template-columns: 1fr; }
    }

    /* ===== Panel ===== */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .panel-body { padding: 18px; }

    /* ===== Video Container ===== */
    .video-area {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16/9;
    }

    .video-area video,
    .video-area canvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ===== Subtitle Overlay ===== */
    .subtitle-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding: 0 5% 4%;
      pointer-events: none;
    }

    .subtitle-text {
      background: var(--subtitle-bg);
      color: var(--subtitle-text);
      font-size: clamp(14px, 2.5vw, 24px);
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 6px;
      text-align: center;
      max-width: 90%;
      line-height: 1.5;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      letter-spacing: 0.5px;
    }
    .subtitle-text.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Placeholder ===== */
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
    }

    .video-placeholder .icon {
      font-size: 48px;
      opacity: 0.5;
    }

    .video-placeholder p { font-size: 15px; }

    /* ===== Upload Zone ===== */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-dim);
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
      color: var(--text);
    }

    .upload-zone .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-zone .upload-hint { font-size: 12px; margin-top: 6px; color: var(--text-dim); }

    /* ===== Controls ===== */
    .controls { display: flex; flex-direction: column; gap: 14px; padding: 18px; }

    .control-group { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    select, input[type="range"], input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    input[type="range"] {
      padding: 4px 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .range-value {
      font-size: 13px;
      color: var(--accent2);
      font-weight: 600;
      text-align: right;
    }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: #5b52e0; transform: translateY(-1px); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); }

    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover { background: #dc2626; }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ===== Progress ===== */
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ===== Status Badge ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-idle { background: rgba(136,136,153,0.2); color: var(--text-dim); }
    .badge-processing { background: rgba(245,158,11,0.2); color: var(--warning); }
    .badge-recording { background: rgba(239,68,68,0.2); color: var(--danger); animation: pulse 1.5s infinite; }
    .badge-done { background: rgba(34,197,94,0.2); color: var(--success); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* ===== Transcript Panel ===== */
    .transcript-list {
      max-height: calc(100vh - 350px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px;
    }

    .transcript-list::-webkit-scrollbar { width: 4px; }
    .transcript-list::-webkit-scrollbar-track { background: transparent; }
    .transcript-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .transcript-item {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .transcript-time {
      color: var(--accent2);
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      padding-top: 2px;
    }

    .transcript-text {
      flex: 1;
      border-radius: 4px;
      padding: 2px 4px;
      margin: -2px -4px;
      transition: background 0.15s;
    }
    .transcript-text:hover {
      background: rgba(108,99,255,0.1);
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
    }

    .toast {
      padding: 12px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease;
      max-width: 320px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    .toast.warning { border-color: var(--warning); }

    /* ===== File info ===== */
    .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 8px;
      font-size: 13px;
    }

    .file-info .file-icon { font-size: 20px; }
    .file-info .file-name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-info .file-size { color: var(--text-dim); font-size: 11px; }

    /* ===== File List ===== */
    .file-list { display: flex; flex-direction: column; gap: 8px; }

    .file-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: slideIn 0.3s ease;
    }
    .file-card.active { border-color: var(--accent); }

    .file-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .file-card-header:hover .file-card-name { color: var(--accent2); }
    .file-card-icon { font-size: 20px; flex-shrink: 0; }
    .file-card-name {
      font-weight: 500;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .file-card-meta {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .file-card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-card-actions .btn { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
      border-radius: 4px;
      transition: all 0.2s;
      line-height: 1;
    }
    .btn-icon:hover { color: var(--danger); background: rgba(239,68,68,0.15); }

    /* ===== File Card Progress ===== */
    .file-card-progress {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .file-progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .file-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .file-progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-dim);
    }
    .file-progress-info .eta {
      color: var(--accent2);
      font-weight: 600;
      font-family: monospace;
    }
    .file-progress-info .pct {
      font-weight: 600;
      color: var(--text);
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); width: 40%; }
      50% { width: 60%; }
      100% { transform: translateX(250%); width: 40%; }
    }

    /* ===== Export ===== */
    .export-section {
      border-top: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ===== Delay settings ===== */
    .delay-badge {
      font-size: 11px;
      padding: 2px 8px;
      background: rgba(108,99,255,0.2);
      color: var(--accent2);
      border-radius: 20px;
    }

    /* ===== Collapsible Panels ===== */
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 8px 0;
      user-select: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .collapsible-header:hover { color: var(--accent2); }
    .collapsible-header .arrow { transition: transform 0.3s; font-size: 10px; color: var(--text-dim); }
    .collapsible-header.open .arrow { transform: rotate(90deg); }
    .collapsible-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .collapsible-body.open { max-height: 600px; }
    .collapsible-body .control-group { margin-top: 8px; }
    .config-input { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
    .config-input:focus { border-color: var(--accent); outline: none; }
    .config-save-btn { width: 100%; padding: 6px; margin-top: 8px; border: none; border-radius: 6px; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; }
    .config-save-btn:hover { background: var(--accent2); }

    /* ===== Glossary Table ===== */
    .glossary-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 6px; }
    .glossary-table th { text-align: left; padding: 4px 6px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 500; }
    .glossary-table td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
    .glossary-table .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 0 4px; }
    .glossary-table .btn-del:hover { color: var(--error); }
    .glossary-add-row { display: flex; gap: 4px; margin-top: 6px; }
    .glossary-add-row input { flex: 1; }
    .glossary-add-row button { flex-shrink: 0; padding: 4px 10px; border: none; border-radius: 4px; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; }
    .glossary-import-row { margin-top: 6px; }
    .glossary-import-row label { font-size: 11px; color: var(--accent); cursor: pointer; text-decoration: underline; }

    /* ===== Profile List ===== */
    .profile-list { display: flex; flex-direction: column; gap: 6px; }
    .profile-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .profile-item-header { display: flex; align-items: center; gap: 8px; padding: 8px 10px; cursor: pointer; }
    .profile-item-header:hover { background: rgba(108,99,255,0.1); }
    .profile-active-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .profile-inactive-dot { width: 8px; height: 8px; border-radius: 50%; background: transparent; flex-shrink: 0; }
    .profile-item-name { flex: 1; font-size: 13px; font-weight: 500; }
    .profile-item-actions { display: flex; gap: 4px; }
    .profile-item-actions button { background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--text-dim); }
    .profile-item-actions button:hover:not(:disabled) { color: var(--accent2); background: rgba(108,99,255,0.15); }
    .profile-item-actions .btn-del-profile:hover:not(:disabled) { color: var(--danger); background: rgba(239,68,68,0.15); }
    .profile-item-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
    .profile-edit-form { border-top: 1px solid var(--border); padding: 10px; }
    .profile-form-section { margin-bottom: 6px; }
    .profile-form-section-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); margin-bottom: 6px; }
    .profile-form-section-header .pf-arrow { font-size: 9px; transition: transform 0.2s; }
    .profile-form-section-header.open .pf-arrow { transform: rotate(90deg); }
    .profile-form-section-body { display: none; flex-direction: column; gap: 6px; padding: 4px 0; }
    .profile-form-section-body.open { display: flex; }
    .profile-form-row { display: flex; flex-direction: column; gap: 3px; }
    .profile-form-row label { font-size: 11px; color: var(--text-dim); }
    .profile-form-row input, .profile-form-row select, .profile-form-row textarea { width: 100%; padding: 5px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; }
    .profile-form-row input:focus, .profile-form-row select:focus, .profile-form-row textarea:focus { border-color: var(--accent); outline: none; }
    .profile-form-row textarea { resize: vertical; min-height: 48px; }
    .profile-form-actions { display: flex; gap: 6px; margin-top: 8px; }
    .profile-form-actions button { flex: 1; padding: 5px; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .profile-form-actions .btn-pf-save { background: var(--accent); color: #fff; }
    .profile-form-actions .btn-pf-save:hover:not(:disabled) { background: var(--accent2); }
    .profile-form-actions .btn-pf-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .profile-form-actions .btn-pf-cancel { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .profile-form-actions .btn-pf-cancel:hover { border-color: var(--accent); }
    .profile-new-btn { width: 100%; padding: 6px; margin-bottom: 8px; border: 1px dashed var(--border); border-radius: 8px; background: none; color: var(--text-dim); font-size: 12px; cursor: pointer; }
    .profile-new-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* ===== Engine Selector ===== */
    .pf-engine-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pf-engine-row select {
      flex: 1;
    }

    .pf-avail-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pf-avail-dot.available   { background: var(--success); }
    .pf-avail-dot.unavailable { background: var(--text-dim); }

    .pf-avail-label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .pf-model-info {
      font-size: 12px;
      color: var(--text-dim);
      padding: 2px 0 6px;
    }
    .pf-model-info .pf-model-ok  { color: var(--success); }
    .pf-model-info .pf-model-err { color: var(--danger); }

    .pf-params-area {
      margin-top: 4px;
    }

    .pf-params-loading {
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 0;
    }

    .pf-params-error {
      font-size: 12px;
      color: var(--danger);
      padding: 6px 0;
    }

    .pf-params-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 6px 0 2px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    /* ===== Translation Status ===== */
    .badge-translating { background: rgba(251,191,36,0.2); color: var(--warning); }
    .badge-translated { background: rgba(74,222,128,0.2); color: var(--success); }
    .badge-pending-trans { background: rgba(136,136,136,0.2); color: var(--text-dim); }
    .btn-retranslate { padding: 4px 10px; font-size: 11px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; }
    .btn-retranslate:hover { background: var(--accent); color: #fff; }
    .btn-retranslate:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Empty state ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🎙 AI 字幕轉換 APP</div>
  <span class="status-text" id="statusText">未連接</span>
  <div class="status-dot" id="statusDot"></div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// Configuration
// ============================================================
const API_BASE = 'http://localhost:5001';
let socket = null;
let currentSid = null;
let selectedFile = null;       // File object pending upload
let activeFileId = null;       // Currently-selected uploaded file
let uploadedFiles = {};        // file_id -> server metadata
let fileProgress = {};         // file_id -> { progress, eta, totalDuration, processedTime }
let subtitleTimeout = null;
let subtitleQueue = [];
let segments = [];
let isProcessing = false;
let subtitleDelay = 0;
let subtitleDuration = 4.0;

// ============================================================
// Socket.IO Connection
// ============================================================
function connectSocket() {
  socket = io(API_BASE, {
    transports: ['websocket', 'polling'],
    reconnectionDelay: 2000,
    reconnectionAttempts: 10
  });

  socket.on('connect', () => {
    setConnectionStatus(true);
  });

  socket.on('disconnect', () => {
    setConnectionStatus(false);
    currentSid = null;
  });

  socket.on('connected', (data) => {
    currentSid = data.sid;
    showToast('已連接到 Whisper 服務器', 'success');
    fetchFileList();
  });

  socket.on('model_loading', (data) => {
    showToast(`正在加載模型 ${data.model}...`, 'warning');
    updateStatus('processing', `加載 ${data.model}`);
  });

  socket.on('model_ready', (data) => {
    showToast(`模型 ${data.model} 已就緒!`, 'success');
    updateStatus('idle', '待機');
    fetchModelStatus();  // Refresh model status indicators
  });

  socket.on('model_error', (data) => {
    showToast(`模型加載失敗: ${data.error}`, 'error');
  });

  socket.on('transcription_status', (data) => {
    updateStatus('processing', data.message);
    setProgress(data.status === 'extracting' ? 20 : 40);

    // Store total duration when transcription starts
    if (activeFileId && data.total_duration) {
      fileProgress[activeFileId] = {
        progress: 0,
        eta: null,
        totalDuration: data.total_duration,
        processedTime: 0,
      };
      renderFileList();
    }
  });

  socket.on('subtitle_segment', (segment) => {
    addSegment(segment);
    scheduleSubtitle(segment);

    // Update progress for active file
    if (activeFileId && segment.progress !== undefined) {
      fileProgress[activeFileId] = {
        progress: segment.progress,
        eta: segment.eta_seconds,
        totalDuration: segment.total_duration,
        processedTime: segment.end,
      };
      renderFileList();
    }
  });

  socket.on('transcription_complete', (data) => {
    setProgress(100);
    updateStatus('done', '完成');
    isProcessing = false;
    document.getElementById('startTranscribeBtn').disabled = false;
    showToast(`轉錄完成! 共 ${data.segment_count} 個字幕段落`, 'success');
    enableExport();
    setTimeout(() => setProgress(0), 2000);
    fetchModelStatus();  // Model may have been loaded during transcription

    // Update file card
    if (data.file_id && uploadedFiles[data.file_id]) {
      uploadedFiles[data.file_id].status = 'done';
      uploadedFiles[data.file_id].segment_count = data.segment_count;
      delete fileProgress[data.file_id];
      renderFileList();
    }
  });

  socket.on('transcription_error', (data) => {
    showToast(`轉錄失敗: ${data.error}`, 'error');
    updateStatus('idle', '錯誤');
    isProcessing = false;
    document.getElementById('startTranscribeBtn').disabled = false;
    setProgress(0);
  });

  // Heartbeat from openai-whisper (blocking) — show elapsed time
  socket.on('transcription_progress', (data) => {
    if (activeFileId) {
      const fp = fileProgress[activeFileId] || {};
      fileProgress[activeFileId] = {
        ...fp,
        totalDuration: data.total_duration,
        elapsed: data.elapsed,
        // For openai-whisper we don't know exact progress, estimate from elapsed
        // Whisper typically processes at ~1x-4x real-time depending on model
        progress: null,  // null = indeterminate
        eta: null,
        processedTime: 0,
      };
      renderFileList();
    }
  });

  socket.on('file_updated', (data) => {
    if (data.id && uploadedFiles[data.id]) {
      Object.assign(uploadedFiles[data.id], data);
      renderFileList();

      // When translation completes, overlay zh_text onto displayed segments
      if (data.translation_status === 'done' && data.id === activeFileId) {
        loadTranslationsForActiveFile(data.id);
      }
    }
  });

}

function setConnectionStatus(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = 'status-dot' + (connected ? ' connected' : '');
  text.textContent = connected ? '已連接' : '未連接';
}

// ============================================================
// File Upload
// ============================================================
const uploadZone = document.getElementById('uploadZone');

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', () => {
  uploadZone.classList.remove('drag-over');
});

uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setPendingFile(file);
});

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) setPendingFile(file);
}

function setPendingFile(file) {
  selectedFile = file;
  const mb = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById('pendingFileBox').style.display = 'flex';
  document.getElementById('pendingFileName').textContent = file.name;
  document.getElementById('pendingFileSize').textContent = `${mb} MB`;
  document.getElementById('startTranscribeBtn').disabled = false;
}

function clearPending() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('pendingFileBox').style.display = 'none';
  document.getElementById('startTranscribeBtn').disabled = true;
}

async function startTranscription() {
  if (!selectedFile || isProcessing) return;
  if (!socket?.connected) {
    showToast('請先連接到服務器', 'error');
    return;
  }

  isProcessing = true;
  segments = [];
  clearTranscriptDisplay();
  document.getElementById('startTranscribeBtn').disabled = true;
  updateStatus('processing', '上傳中...');
  setProgress(10);

  const formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('model', document.getElementById('modelSelect').value);
  formData.append('sid', currentSid);

  try {
    const resp = await fetch(`${API_BASE}/api/transcribe`, {
      method: 'POST',
      body: formData
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // Add to local file list
    uploadedFiles[data.file_id] = {
      id: data.file_id,
      original_name: selectedFile.name,
      size: selectedFile.size,
      status: 'transcribing',
      segment_count: 0,
    };
    activeFileId = data.file_id;
    renderFileList();

    // Show video preview from server
    loadMediaPreview(data.file_id);

    // Clear pending
    clearPending();

    setProgress(30);
    showToast('文件上傳成功，開始轉錄...', 'success');
  } catch (err) {
    showToast(`上傳失敗: ${err.message}`, 'error');
    isProcessing = false;
    document.getElementById('startTranscribeBtn').disabled = false;
    setProgress(0);
  }
}

// ============================================================
// File List Management
// ============================================================
async function fetchFileList() {
  try {
    const resp = await fetch(`${API_BASE}/api/files`);
    const data = await resp.json();
    uploadedFiles = {};
    for (const f of data.files) {
      uploadedFiles[f.id] = f;
    }
    renderFileList();
  } catch (e) { /* server not ready yet */ }
}

function renderFileList() {
  const container = document.getElementById('fileList');
  const ids = Object.keys(uploadedFiles);

  if (ids.length === 0) {
    container.innerHTML = '';
    return;
  }

  // Sort newest first
  ids.sort((a, b) => (uploadedFiles[b].uploaded_at || 0) - (uploadedFiles[a].uploaded_at || 0));

  container.innerHTML = ids.map(id => {
    const f = uploadedFiles[id];
    const mb = (f.size / 1024 / 1024).toFixed(1);
    const isActive = id === activeFileId;
    const isDone = f.status === 'done';
    const isError = f.status === 'error';
    const isBusy = f.status === 'transcribing';

    let statusHtml = '';
    if (isDone) statusHtml = '<span class="badge badge-done">完成</span>';
    else if (isBusy) statusHtml = '<span class="badge badge-processing">轉錄中</span>';
    else if (isError) statusHtml = '<span class="badge badge-idle">錯誤</span>';
    else statusHtml = '<span class="badge badge-idle">已上傳</span>';

    // Model info
    let modelBadge = '';
    if (f.model) {
      const bk = f.backend === 'faster-whisper' ? 'faster' : 'openai';
      modelBadge = `<span class="delay-badge" style="margin-left:0;">${f.model} · ${bk}</span>`;
    }

    let extraHtml = '';
    if (isDone) {
      const hasTranslations = f.translation_status === 'done';
      const isTranslating = f.translation_status === 'translating';
      const proofreadBtn = hasTranslations
        ? `<a class="btn btn-secondary" href="proofread.html?file_id=${id}" style="background:var(--accent);color:#fff;">校對</a>`
        : '';

      let transBadge = '<span class="badge badge-pending-trans">待翻譯</span>';
      if (hasTranslations) transBadge = '<span class="badge badge-translated">翻譯完成</span>';
      else if (isTranslating) transBadge = '<span class="badge badge-translating">翻譯中...</span>';

      const translateBtn = isTranslating
        ? ''
        : hasTranslations
          ? `<button class="btn-retranslate" onclick="event.stopPropagation(); reTranslateFile('${id}', this)">🔄 重新翻譯</button>`
          : `<button class="btn-retranslate" onclick="event.stopPropagation(); reTranslateFile('${id}', this)">▶ 翻譯</button>`;

      extraHtml = `
        <div class="file-card-actions">
          ${modelBadge}
          ${transBadge}
          <a class="btn btn-secondary" href="${API_BASE}/api/files/${id}/subtitle.srt" download>SRT</a>
          <a class="btn btn-secondary" href="${API_BASE}/api/files/${id}/subtitle.vtt" download>VTT</a>
          <a class="btn btn-secondary" href="${API_BASE}/api/files/${id}/subtitle.txt" download>TXT</a>
          ${translateBtn}
          ${proofreadBtn}
        </div>`;
    } else if (isBusy && fileProgress[id]) {
      const fp = fileProgress[id];
      const hasDeterminateProgress = fp.progress != null && fp.progress > 0;

      if (hasDeterminateProgress) {
        // Determinate progress (faster-whisper streams segments)
        const pct = Math.round(fp.progress * 100);
        const processed = formatDuration(fp.processedTime || 0);
        const total = formatDuration(fp.totalDuration || 0);
        const etaStr = fp.eta != null ? formatDuration(fp.eta) : '--:--';
        extraHtml = `
          <div class="file-card-progress">
            <div class="file-progress-bar">
              <div class="file-progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="file-progress-info">
              <span>${processed} / ${total}</span>
              <span class="pct">${pct}%</span>
              <span>預計剩餘 <span class="eta">${etaStr}</span></span>
            </div>
          </div>`;
      } else {
        // Indeterminate progress (openai-whisper blocks, we show elapsed time)
        const elapsed = formatDuration(fp.elapsed || 0);
        const total = formatDuration(fp.totalDuration || 0);
        extraHtml = `
          <div class="file-card-progress">
            <div class="file-progress-bar">
              <div class="file-progress-fill" style="width:100%;animation:indeterminate 1.8s infinite linear"></div>
            </div>
            <div class="file-progress-info">
              <span>音頻時長 ${total}</span>
              <span class="pct">轉錄中...</span>
              <span>已耗時 <span class="eta">${elapsed}</span></span>
            </div>
          </div>`;
      }
    } else if (isBusy) {
      // Busy but no progress data yet (still extracting audio)
      extraHtml = `
        <div class="file-card-progress">
          <div class="file-progress-bar">
            <div class="file-progress-fill" style="width:100%;animation:indeterminate 1.8s infinite linear"></div>
          </div>
          <div class="file-progress-info">
            <span>準備中...</span>
          </div>
        </div>`;
    }

    return `
      <div class="file-card ${isActive ? 'active' : ''}" data-file-id="${id}">
        <div class="file-card-header" onclick="selectFile('${id}')">
          <span class="file-card-icon">${isDone ? '✅' : isBusy ? '⏳' : isError ? '❌' : '🎬'}</span>
          <span class="file-card-name">${escapeHtml(f.original_name)}</span>
          <span class="file-card-meta">${mb} MB</span>
          ${statusHtml}
          <button class="btn-icon" onclick="event.stopPropagation(); deleteFile('${id}')" title="刪除">✕</button>
        </div>
        ${extraHtml}
      </div>`;
  }).join('');
}

function selectFile(fileId) {
  activeFileId = fileId;
  renderFileList();
  loadMediaPreview(fileId);

  // Load segments for this file from server
  loadFileSegments(fileId);
}

async function loadFileSegments(fileId) {
  try {
    const resp = await fetch(`${API_BASE}/api/files/${fileId}/segments`);
    const data = await resp.json();
    if (data.status === 'done' && data.segments && data.segments.length > 0) {
      segments = data.segments;

      // Always try to fetch translations — overlay zh_text onto segments before rendering
      try {
        const tResp = await fetch(`${API_BASE}/api/files/${fileId}/translations`);
        if (tResp.ok) {
          const tData = await tResp.json();
          const translations = tData.translations || [];
          if (translations.length > 0) {
            for (let i = 0; i < segments.length && i < translations.length; i++) {
              segments[i]._en_text = segments[i].text;
              segments[i].text = translations[i].zh_text || segments[i].text;
            }
          }
        }
      } catch (e) { /* translation fetch failed, keep English */ }

      // Rebuild transcript display (with Chinese if translations were loaded)
      clearTranscriptDisplay();
      for (const seg of segments) {
        addSegment(seg, true);
      }
      enableExport();
    }
  } catch (e) { /* ignore */ }
}

function loadMediaPreview(fileId) {
  const video = document.getElementById('videoPlayer');
  video.src = `${API_BASE}/api/files/${fileId}/media`;
  video.style.display = 'block';
  document.getElementById('videoPlaceholder').style.display = 'none';
}

async function deleteFile(fileId) {
  try {
    const resp = await fetch(`${API_BASE}/api/files/${fileId}`, { method: 'DELETE' });
    const data = await resp.json();
    if (data.status === 'deleted') {
      delete uploadedFiles[fileId];
      if (activeFileId === fileId) {
        activeFileId = null;
        document.getElementById('videoPlayer').style.display = 'none';
        document.getElementById('videoPlayer').src = '';
        document.getElementById('videoPlaceholder').style.display = 'flex';
        segments = [];
        clearTranscriptDisplay();
        disableExport();
        hideSubtitle();
      }
      renderFileList();
      showToast('文件已刪除', 'success');
    }
  } catch (err) {
    showToast(`刪除失敗: ${err.message}`, 'error');
  }
}

// Subtitle Display
// ============================================================
function scheduleSubtitle(segment) {
  // Segments are added to the array and the timeupdate handler
  // (below) handles display during actual video playback.
  // Nothing extra to do at arrival time.
}

function showSubtitleText(text) {
  if (!text?.trim()) return;

  const el = document.getElementById('subtitleText');
  const duration = subtitleDuration * 1000;

  el.textContent = text;
  el.classList.add('visible');

  if (subtitleTimeout) clearTimeout(subtitleTimeout);
  subtitleTimeout = setTimeout(hideSubtitle, duration);
}

function hideSubtitle() {
  const el = document.getElementById('subtitleText');
  el.classList.remove('visible');
}

// ============================================================
// Video sync subtitles (for file playback)
// The delay slider shifts when subtitles appear relative to video time:
//   delay > 0 → subtitles appear later (compensate for processing lag)
//   delay < 0 would appear earlier (not exposed in UI)
// We show a segment when: videoTime >= segment.start + delay
// and hide it when:        videoTime >  segment.end   + delay
// ============================================================
document.getElementById('videoPlayer').addEventListener('timeupdate', function() {
  const currentTime = this.currentTime;
  const d = subtitleDelay;  // seconds, typically 0–5

  // Find segment whose shifted window covers current playback time
  const active = segments.find(s =>
    currentTime >= (s.start + d) &&
    currentTime <= (s.end   + d + 0.3)  // 0.3s grace to avoid flicker
  );

  const el = document.getElementById('subtitleText');
  if (active && active.text?.trim()) {
    el.textContent = active.text;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
});

// ============================================================
// Transcript Display
// ============================================================
function addSegment(segment, skipPush) {
  if (!skipPush) segments.push(segment);
  const count = document.getElementById('segmentCount');
  count.textContent = `${segments.length} 段`;

  const list = document.getElementById('transcriptList');

  // Remove empty state
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'transcript-item';

  const timeEl = document.createElement('div');
  timeEl.className = 'transcript-time';
  timeEl.textContent = formatTime(segment.start);

  const textEl = document.createElement('div');
  textEl.className = 'transcript-text';
  textEl.textContent = segment.text;
  textEl.title = '點擊編輯';
  textEl.style.cursor = 'text';
  textEl.addEventListener('click', () => startEditSegment(textEl, segment));

  item.appendChild(timeEl);
  item.appendChild(textEl);
  list.appendChild(item);
}

function startEditSegment(textEl, segment) {
  // Already editing
  if (textEl.querySelector('input')) return;

  const original = segment.text;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = original;
  input.style.cssText = 'width:100%;background:var(--bg);color:var(--text);border:1px solid var(--accent);border-radius:4px;padding:4px 6px;font-size:14px;outline:none;';

  textEl.textContent = '';
  textEl.appendChild(input);
  input.focus();
  input.select();

  function save() {
    const newText = input.value.trim();
    textEl.textContent = newText || original;
    textEl.style.cursor = 'text';

    if (newText && newText !== original) {
      segment.text = newText;
      // Also update the segments array
      const seg = segments.find(s => s.id === segment.id && s.start === segment.start);
      if (seg) seg.text = newText;

      // Save to backend if we have an active file
      if (activeFileId) {
        fetch(`${API_BASE}/api/files/${activeFileId}/segments/${segment.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: newText })
        }).catch(() => showToast('保存失敗', 'error'));
      }
    }
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = original; input.blur(); }
  });
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 100);
  if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
  return `${pad(m)}:${pad(s)}.${pad(ms)}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function formatDuration(seconds) {
  if (seconds == null || isNaN(seconds)) return '--:--';
  const s = Math.round(seconds);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${pad(m)}:${pad(sec)}`;
}

function clearTranscript() {
  segments = [];
  clearTranscriptDisplay();
  document.getElementById('segmentCount').textContent = '0 段';
  disableExport();
}

function clearTranscriptDisplay() {

// ============================================================
// Export
// ============================================================
function exportSRT() {
  if (!segments.length) return;

  let srt = '';
  segments.forEach((seg, i) => {
    srt += `${i + 1}\n`;
    srt += `${formatSRTTime(seg.start)} --> ${formatSRTTime(seg.end)}\n`;
    srt += `${seg.text}\n\n`;
  });

  downloadFile(srt, 'subtitles.srt', 'text/plain');
}

function exportVTT() {
  if (!segments.length) return;

  let vtt = 'WEBVTT\n\n';
  segments.forEach((seg, i) => {
    vtt += `${i + 1}\n`;
    vtt += `${formatVTTTime(seg.start)} --> ${formatVTTTime(seg.end)}\n`;
    vtt += `${seg.text}\n\n`;
  });

  downloadFile(vtt, 'subtitles.vtt', 'text/vtt');
}

function exportTXT() {
  if (!segments.length) return;
  const text = segments.map(s => s.text).join('\n');
  downloadFile(text, 'transcript.txt', 'text/plain');
}

function formatVTTTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)}.${String(ms).padStart(3,'0')}`;
}

function formatSRTTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  const ms = Math.floor((seconds % 1) * 1000);
  return `${pad(h)}:${pad(m)}:${pad(s)},${String(ms).padStart(3,'0')}`;
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function enableExport() {
  document.getElementById('exportSrtBtn').disabled = false;
  document.getElementById('exportVttBtn').disabled = false;
  document.getElementById('exportTxtBtn').disabled = false;
}

function disableExport() {
  document.getElementById('exportSrtBtn').disabled = true;
  document.getElementById('exportVttBtn').disabled = true;
  document.getElementById('exportTxtBtn').disabled = true;
}

function escapeHtml(str) {

    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderProfileList() {
  const container = document.getElementById('profileList');
  if (!container) return;

  let html = `<button class="profile-new-btn" onclick="openCreateForm()">＋ New Profile</button>`;

  if (isCreating) {
    html += buildProfileFormHTML(null);
  }

  for (const p of profilesData) {
    const isActive = p.id === activeProfileId;
    const isEditing = p.id === editingProfileId;
    const dot = isActive
      ? `<span class="profile-active-dot" title="Active"></span>`
      : `<span class="profile-inactive-dot"></span>`;
    const delDisabled = isActive ? 'disabled title="請先切換至其他 Profile"' : '';

    html += `
      <div class="profile-item">
        <div class="profile-item-header" onclick="activateProfile('${escapeHtml(p.id)}')">
          ${dot}
          <span class="profile-item-name">${escapeHtml(p.name)}</span>

  }

  container.innerHTML = html;

async function saveProfile() {
  const name = document.getElementById('pfName').value.trim();
  if (!name) { showToast('請輸入 Profile 名稱', 'error'); return; }

  const profileId = document.getElementById('pfId').value;
  const payload = {
    name,
    description: document.getElementById('pfDesc').value.trim(),
    asr: {
      engine:             document.getElementById('pfAsrEngine').value,
      model_size:         document.getElementById('pfAsrModel').value,
      language:           document.getElementById('pfAsrLang').value.trim() || 'en',
      language_config_id: document.getElementById('pfAsrLangConfig').value.trim() || 'en',
      device:             document.getElementById('pfAsrDevice').value,
    },
    translation: {
      engine:      document.getElementById('pfTrEngine').value,
      style:       document.getElementById('pfTrStyle').value,
      temperature: parseFloat(document.getElementById('pfTrTemp').value),
      glossary_id: document.getElementById('pfTrGlossary').value || null,
    },
    font: {
      family:        document.getElementById('pfFontFamily').value.trim() || 'Noto Sans TC',
      size:          parseInt(document.getElementById('pfFontSize').value, 10),
      color:         document.getElementById('pfFontColor').value,
      outline_color: document.getElementById('pfFontOutlineColor').value,
      outline_width: parseInt(document.getElementById('pfFontOutlineWidth').value, 10),
      position:      document.getElementById('pfFontPosition').value,
      margin_bottom: parseInt(document.getElementById('pfFontMargin').value, 10),
    },
  };

  const btn = document.getElementById('pfSaveBtn');
  btn.disabled = true;
  btn.textContent = '儲存中...';

  try {
    const url    = profileId ? `${API_BASE}/api/profiles/${profileId}` : `${API_BASE}/api/profiles`;
    const method = profileId ? 'PATCH' : 'POST';
    const resp   = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (resp.ok) {
      showToast(profileId ? 'Profile 已更新' : 'Profile 已建立', 'success');
      editingProfileId = null;
      isCreating = false;
      await loadProfiles();
    } else {
      const msg = Array.isArray(data.errors)
        ? data.errors.join(', ')
        : (data.error || '操作失敗');
      showToast(msg, 'error');
      btn.disabled = false;
      btn.textContent = profileId ? '儲存' : '建立';
    }
  } catch (e) {
    showToast('操作失敗，請重試', 'error');
    btn.disabled = false;
    btn.textContent = profileId ? '儲存' : '建立';
  }
}

async function deleteProfile(profileId, name) {
  if (!confirm(`確定刪除 Profile「${name}」？`)) return;
  try {
    const resp = await fetch(`${API_BASE}/api/profiles/${profileId}`, { method: 'DELETE' });
    if (resp.ok) {
      showToast('Profile 已刪除', 'success');
      if (editingProfileId === profileId) editingProfileId = null;
      await loadProfiles();
    } else {
      const data = await resp.json();
      showToast(data.error || '刪除失敗', 'error');
    }
  } catch (e) {
    showToast('操作失敗，請重試', 'error');
  }
}

async function activateProfile(profileId) {
  if (!profileId) return;
  try {
    const resp = await fetch(`${API_BASE}/api/profiles/${profileId}/activate`, { method: 'POST' });
    if (resp.ok) {
      activeProfileId = profileId;
      renderProfileList();
      showToast('Profile activated', 'success');
    } else {
      showToast('Failed to activate profile', 'error');
    }
  } catch (e) {
    showToast('Failed to activate profile', 'error');
  }
}

      max_words_per_segment: parseInt(document.getElementById('langMaxWords').value),
      max_segment_duration: parseFloat(document.getElementById('langMaxDuration').value),
    },
    translation: {
      batch_size: parseInt(document.getElementById('langBatchSize').value),
      temperature: parseFloat(document.getElementById('langTemperature').value),
    },
  };
  try {
    const resp = await fetch(`${API_BASE}/api/languages/${langId}`, {
      method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data),
    });
    if (resp.ok) { showToast('語言配置已儲存', 'success'); }
    else { const err = await resp.json(); showToast(err.errors || err.error || '儲存失敗', 'error'); }
  } catch (e) { showToast('儲存失敗', 'error'); }
}

function toggleCollapsible(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// ============================================================
// Glossary Management
// ============================================================
let glossariesData = [];
let currentGlossaryId = null;

async function loadGlossaries() {
  try {
    const resp = await fetch(`${API_BASE}/api/glossaries`);
    const data = await resp.json();
    glossariesData = data.glossaries || [];
    const select = document.getElementById('glossarySelect');
    select.innerHTML = '<option value="">Select...</option>';
    for (const g of glossariesData) {
      const opt = document.createElement('option');
      opt.value = g.id;
      opt.textContent = `${g.name} (${g.entry_count} entries)`;
      select.appendChild(opt);
    }
  } catch (e) { console.warn('Failed to load glossaries:', e); }
}

async function loadGlossaryEntries(glossaryId) {
  currentGlossaryId = glossaryId;
  const container = document.getElementById('glossaryEntries');
  if (!glossaryId) { container.innerHTML = ''; return; }
  try {
    const resp = await fetch(`${API_BASE}/api/glossaries/${glossaryId}`);
    if (!resp.ok) return;
    const data = await resp.json();
    const entries = data.entries || [];
    if (entries.length === 0) {
      container.innerHTML = '<div style="font-size:11px;color:var(--text-dim);padding:4px;">無術語</div>';
      return;
    }
    let html = '<table class="glossary-table"><thead><tr><th>EN</th><th>中文</th><th></th></tr></thead><tbody>';
    for (const entry of entries) {
      const eid = entry.id || '';
      html += `<tr><td>${escapeHtml(entry.en)}</td><td>${escapeHtml(entry.zh)}</td><td><button class="btn-del" onclick="deleteGlossaryEntry('${eid}')">✕</button></td></tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (e) { console.warn('Failed to load glossary entries:', e); }
}

async function addGlossaryEntry() {
  if (!currentGlossaryId) { showToast('請先選擇術語表', 'warning'); return; }
  const en = document.getElementById('newEntryEn').value.trim();
  const zh = document.getElementById('newEntryZh').value.trim();
  if (!en || !zh) { showToast('請填寫英文和中文', 'warning'); return; }
  try {
    const resp = await fetch(`${API_BASE}/api/glossaries/${currentGlossaryId}/entries`, {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({en, zh}),
    });
    if (resp.ok) {
      document.getElementById('newEntryEn').value = '';
      document.getElementById('newEntryZh').value = '';
      loadGlossaryEntries(currentGlossaryId);
      loadGlossaries();
      showToast('術語已新增', 'success');
    } else { showToast('新增失敗', 'error'); }
  } catch (e) { showToast('新增失敗', 'error'); }
}

async function deleteGlossaryEntry(entryId) {
  if (!currentGlossaryId || !entryId) return;
  try {
    const resp = await fetch(`${API_BASE}/api/glossaries/${currentGlossaryId}/entries/${entryId}`, {method: 'DELETE'});
    if (resp.ok) { loadGlossaryEntries(currentGlossaryId); loadGlossaries(); showToast('術語已刪除', 'success'); }
  } catch (e) { showToast('刪除失敗', 'error'); }
}

async function importGlossaryCSV(fileInput) {
  if (!currentGlossaryId) { showToast('請先選擇術語表', 'warning'); return; }
  const file = fileInput.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const resp = await fetch(`${API_BASE}/api/glossaries/${currentGlossaryId}/import`, {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({csv_content: text}),
    });
    if (resp.ok) {
      const data = await resp.json();
      loadGlossaryEntries(currentGlossaryId);
      loadGlossaries();
      showToast(`匯入完成，共 ${(data.entries || []).length} 個術語`, 'success');
    } else { showToast('匯入失敗', 'error'); }
  } catch (e) { showToast('匯入失敗', 'error'); }
  fileInput.value = '';
}

// ============================================================
// Re-translate
// ============================================================
async function reTranslateFile(fileId, btnEl) {
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '翻譯中...'; }
  try {
    const resp = await fetch(`${API_BASE}/api/translate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({file_id: fileId}),
    });
    if (resp.ok) {
      showToast('重新翻譯完成', 'success');
      await fetchFileList();
      if (activeFileId === fileId) {
        await loadFileSegments(fileId);
      }
    } else {
      const err = await resp.json();
      showToast(err.error || '翻譯失敗', 'error');
    }
  } catch (e) {
    showToast('翻譯失敗', 'error');
  }
  if (btnEl) { btnEl.disabled = false; btnEl.textContent = '🔄 重新翻譯'; }
}

// ============================================================
// Translation overlay — replace segment text with zh_text
// ============================================================
async function loadTranslationsForActiveFile(fileId) {
  try {
    const resp = await fetch(`${API_BASE}/api/files/${fileId}/translations`);
    if (!resp.ok) return;
    const data = await resp.json();
    const translations = data.translations || [];
    if (translations.length === 0) return;

    // Overlay zh_text onto segments array for subtitle display
    for (let i = 0; i < segments.length && i < translations.length; i++) {
      segments[i]._en_text = segments[i].text;  // preserve original
      segments[i].text = translations[i].zh_text || segments[i].text;
    }

    // Re-render transcript panel with translated text
    const container = document.getElementById('transcriptList');
    if (container) {
      container.querySelectorAll('.transcript-text').forEach((el, i) => {
        if (i < segments.length) {
          el.textContent = segments[i].text;
        }
      });
    }

    showToast('翻譯完成，字幕已更新為中文', 'success');
  } catch (e) {
    console.warn('Failed to load translations:', e);
  }
}

// ============================================================
// Restart Service
// ============================================================
async function restartService() {
  const btn = document.getElementById('restartBtn');
  btn.classList.add('spinning');

  // Try to trigger server restart
  try {
    await fetch(`${API_BASE}/api/restart`, { method: 'POST' });
  } catch (e) { /* server may already be restarting */ }

  showToast('正在重啟服務器...', 'warning');
  setConnectionStatus(false);

  // Poll until server is back
  let attempts = 0;
  const poll = setInterval(async () => {
    attempts++;
    try {
      const resp = await fetch(`${API_BASE}/api/health`, { signal: AbortSignal.timeout(2000) });
      if (resp.ok) {
        clearInterval(poll);
        btn.classList.remove('spinning');
        showToast('服務器已重啟!', 'success');

        // Reconnect socket
        if (socket) { socket.disconnect(); }
        connectSocket();
        fetchModelStatus();
      }
    } catch (e) { /* still restarting */ }

    if (attempts > 30) {
      clearInterval(poll);
      btn.classList.remove('spinning');
      showToast('重啟超時，請手動檢查服務器', 'error');
    }
  }, 2000);
}

// ============================================================
// Model Status
// ============================================================
let modelsData = [];  // cached from server

async function fetchModelStatus() {
  try {
    const resp = await fetch(`${API_BASE}/api/models`);
    const data = await resp.json();
    modelsData = data.models;
    populateModelSelect();
  } catch (e) { /* server not ready */ }
}

function populateModelSelect() {
  const select = document.getElementById('modelSelect');
  const currentVal = select.value;

  select.innerHTML = modelsData.map(m => {
    let label = `${m.name} - ${m.params}`;
    if (m.status === 'loaded') {
      label += '（已在線 ✓）';
    } else if (m.status === 'downloaded') {
      label += '（需加載）';
    } else {
      label += '（需下載）';
    }
    return `<option value="${m.id}">${label}</option>`;
  }).join('');

  // Restore previous selection or default to small
  if (modelsData.some(m => m.id === currentVal)) {
    select.value = currentVal;
  } else {
    select.value = 'small';
  }
  updateModelHint();
}

function updateModelHint() {
  const select = document.getElementById('modelSelect');
  const hint = document.getElementById('modelStatusHint');
  const m = modelsData.find(x => x.id === select.value);
  if (!m) { hint.textContent = ''; return; }

  if (m.status === 'loaded') {
    hint.innerHTML = `<span style="color:var(--success);">● 模型已加載，可直接使用</span>`;
  } else if (m.status === 'downloaded') {
    hint.innerHTML = `<span style="color:var(--warning);">● 模型已下載，首次使用時需加載到記憶體</span>`;
  } else {
    hint.innerHTML = `<span style="color:var(--danger);">● 模型尚未下載，首次使用時需下載 (${m.params}) 並加載</span>`;
  }
}

document.getElementById('modelSelect').addEventListener('change', updateModelHint);
